<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-purple-100 text-slate-800">

  <!-- 🔝 NAVBAR -->
  <header class="bg-white/70 backdrop-blur shadow-lg px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 text-transparent bg-clip-text">
      Admin Panel
    </h1>

    <div class="flex items-center gap-5">
      <span id="adminName" class="text-sm text-gray-600 font-medium"></span>

      <button id="logoutBtn"
        class="bg-red-500 text-white px-4 py-1.5 rounded-lg shadow-md transform hover:scale-105 hover:bg-red-600 transition duration-200">
        Logout
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="max-w-7xl mx-auto mt-8 grid grid-cols-12 gap-6 px-4">

    <!-- 📊 LEFT -->
    <div class="col-span-3 space-y-6">

      <!-- Dashboard -->
      <div id="dashboardCard"
        class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-6 
        transform hover:-translate-y-1 hover:shadow-2xl transition duration-300 cursor-pointer">

        <h2 class="font-semibold text-lg mb-2">Dashboard</h2>
        <p class="text-sm text-gray-500">Manage placements & students</p>
      </div>

      <!-- Stats -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <h3 class="font-semibold text-gray-700 mb-3">Stats</h3>

        <div class="flex justify-between text-sm mb-2">
          <span>Total Jobs</span>
          <span id="totalJobs" class="font-semibold text-blue-600"></span>
        </div>

        <div class="flex justify-between text-sm">
          <span>Total Applications</span>
          <span id="totalApplications" class="font-semibold text-green-600"></span>
        </div>
      </div>

    </div>

    <!-- 🧾 CENTER -->
    <div class="col-span-6 space-y-6">

      <!-- ➕ ADD JOB -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-6">
        <h3 class="font-semibold text-lg mb-4">Add New Job</h3>

        <form id="jobForm" class="space-y-3">

          <input id="company" placeholder="Company Name"
            class="w-full p-3 border rounded-lg" required />

          <input id="role" placeholder="Job Role"
            class="w-full p-3 border rounded-lg" required />

          <input id="package" placeholder="Package"
            class="w-full p-3 border rounded-lg" required />

          <textarea id="description" placeholder="Job Description"
            class="w-full p-3 border rounded-lg"></textarea>

          <button class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-2 rounded-lg">
            Add Job 🚀
          </button>

        </form>
      </div>

      <!-- 📋 JOB LIST -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5">
        <h3 class="font-semibold text-lg mb-4">All Jobs</h3>
        <div id="jobsContainer" class="space-y-4"></div>
      </div>

      <!-- 📊 APPLICATIONS -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5">
        <h3 class="font-semibold text-lg mb-4">Student Applications</h3>
        <div id="applicationsContainer" class="space-y-4"></div>
      </div>

      <!-- 🔥 DASHBOARD DATA -->
      <div id="dashboardData" class="hidden bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5">

        <h3 class="font-semibold text-lg mb-4">📊 System Overview</h3>

        <!-- 🔍 SEARCH -->
        <input id="searchStudent" placeholder="Search student..."
          class="w-full p-2 border rounded mb-3" />

        <!-- SORT -->
        <button id="sortCgpa"
          class="mb-4 bg-blue-100 text-blue-600 px-3 py-1 rounded text-sm">
          Sort by CGPA
        </button>

        <!-- STUDENTS -->
        <div class="mb-6">
          <h4 class="font-semibold mb-2">👨‍🎓 Students</h4>
          <div id="studentsList" class="space-y-2"></div>
        </div>

        <!-- JOB GROUP -->
        <div>
          <h4 class="font-semibold mb-2">💼 Job-wise Applications</h4>
          <div id="jobWiseList" class="space-y-3"></div>
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-span-3"></div>

  </div>

 <script type="module" src="admin.js"></script>

</body>
</html>
