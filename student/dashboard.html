<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-purple-100 text-slate-800">
 <div id="toast"
  class="fixed top-5 right-5 px-5 py-2 rounded-lg shadow-lg 
         opacity-0 transition duration-300 
         z-[9999] pointer-events-none bg-black text-white">
</div>

 <header class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b border-slate-700 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-xl">

  <!-- LEFT -->
  <div>
    <h1 class="text-xl font-bold text-blue-400 tracking-wide">
      NIT POLLYTECNIC
    </h1>
    <p class="text-xs text-gray-400">E-Placement System</p>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-5">

    <span id="welcome" class="text-sm text-gray-300 font-medium"></span>

    <button id="logoutBtn"
      class="bg-red-600 text-white px-4 py-1.5 rounded-lg shadow-md 
             hover:bg-red-700 transition duration-200">
      Logout
    </button>

  </div>

</header>

  <!-- MAIN -->
  <div class="max-w-7xl mx-auto mt-8 grid grid-cols-12 gap-6 px-4">

    <!-- LEFT -->
    <div class="col-span-3 space-y-6">

      <!-- Profile -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-6 text-center 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <img id="photo"
          class="w-28 h-28 rounded-full mx-auto mb-4 border-4 border-blue-500 object-cover shadow-md 
                 transform hover:scale-110 transition duration-300"/>

        <h2 id="name" class="text-lg font-bold"></h2>
        <p id="dept" class="text-gray-500 text-sm"></p>
        <p id="dob" class="text-sm text-gray-600"></p>
        <p id="gender" class="text-sm text-gray-600"></p>

        <hr class="my-4">

        <p class="text-xs text-gray-500">CGPA</p>
        <p id="cgpa" class="text-2xl font-bold text-blue-600"></p>
      </div>

      <!-- Activity -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <h3 class="font-semibold mb-3">Your Activity</h3>

        <div class="flex justify-between text-sm mb-2">
          <span>Applications</span>
          <span id="applications"></span>
        </div>

        <div class="flex justify-between text-sm">
          <span>Status</span>
          <span id="status" class="text-green-600 font-semibold"></span>
        </div>
      </div>

      <!-- CV Upload -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <h3 class="font-semibold mb-3">Upload CV</h3>

        <input type="file" id="cvUpload"
          class="w-full text-sm mb-3 border rounded-lg p-2 bg-white"/>

        <button id="uploadBtn"
          class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-2 rounded-lg 
                 transform hover:scale-105 hover:shadow-lg transition duration-300">
          Upload
        </button>

        <p id="cvStatus" class="text-xs text-gray-500 mt-2"></p>
      </div>

    </div>

    <!-- CENTER -->
    <div class="col-span-6 space-y-6">

      <!-- Announcement -->
      <div class="bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white rounded-2xl shadow-xl p-6 
                  transform hover:scale-[1.02] transition duration-300">

        <h3 class="font-semibold text-lg mb-2">🔥 Latest Opportunities</h3>
        <p id="announcement" class="text-sm opacity-90"></p>
      </div>
      <div class="flex gap-3 mb-4">
        <button id="eligibleBtn" class="bg-blue-600 text-white px-4 py-2 rounded">
             Eligible Jobs
           </button>
           <button id="allJobsBtn" class="bg-gray-200 px-4 py-2 rounded">
                   All Jobs
           </button>
         </div>

      <!-- JOBS -->
      <div id="placementsContainer" class="grid grid-cols-1 gap-5">
        <!-- JS inject cards -->
      </div>

      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 mt-6">
  <h3 class="font-semibold mb-3">Applied Jobs</h3>
  <div id="appliedJobsContainer" class="space-y-2"></div>
</div>

    </div>

    <!-- RIGHT -->
    <div class="col-span-3 space-y-6">

      <!-- Profile Strength -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <h3 class="font-semibold mb-3">Profile Strength</h3>

        <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden">
          <div id="profileBar"
            class="bg-gradient-to-r from-blue-500 to-purple-600 h-3 rounded-full w-0 transition-all duration-500"></div>
        </div>

        <p id="profileText" class="text-sm text-gray-500 mt-2"></p>
      </div>

      <!-- Tips -->
      <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl p-5 
                  transform hover:-translate-y-1 hover:shadow-2xl transition duration-300">

        <h3 class="font-semibold mb-3">Tips</h3>
        <ul id="tipsList" class="text-sm text-gray-600 space-y-2"></ul>
      </div>

    </div>

  </div>

  <!-- MODAL -->
  <div id="jobModal"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 transition duration-300">

  <!-- MODAL BOX -->
  <div id="modalBox"
    class="bg-white w-[90%] max-w-xl rounded-2xl p-6 relative
           max-h-[90vh] overflow-y-auto
           transform scale-90 opacity-0 transition duration-300">

    <!-- ❌ CLOSE BUTTON -->
    <button id="closeModal"
      class="absolute top-3 right-3 text-gray-500 hover:text-red-500 text-xl">
      ✖
    </button>

    <!-- CONTENT -->
    <h2 id="modalCompany" class="text-xl font-bold text-blue-600 mb-2"></h2>
    <p id="modalRole" class="text-gray-600"></p>
    <p id="modalPackage" class="text-indigo-600 font-semibold mb-3"></p>

    <p id="modalDesc" class="text-sm text-gray-700 leading-relaxed"></p>

    <!-- APPLY BUTTON -->
    <div class="sticky bottom-0 bg-white pt-4 mt-4">
      <button id="applyBtnModal"
        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-2 rounded-lg hover:scale-105 transition">
        Apply Now
      </button>
    </div>

  </div>
</div>
  <script src="student.js"></script>

</body>
</html>
