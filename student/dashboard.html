<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

  <!-- 🔝 NAVBAR -->
  <header class="bg-white shadow px-6 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">E-Placement Portal</h1>

    <div class="flex items-center gap-4">
      <span id="welcome" class="text-sm text-gray-600"></span>
      <button id="logoutBtn"
        class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 text-sm">
        Logout
      </button>
    </div>
  </header>

  <!-- MAIN GRID -->
  <div class="max-w-7xl mx-auto mt-6 grid grid-cols-12 gap-6 px-4">

    <!-- 👤 LEFT -->
    <div class="col-span-3 space-y-6">

      <!-- Profile -->
      <div class="bg-white rounded-xl shadow p-5 text-center">
        <img id="photo"
          class="w-24 h-24 rounded-full mx-auto mb-3 border-4 border-blue-500"/>
          
        <h2 id="name" class="text-lg font-semibold"></h2>
        <p id="dept" class="text-gray-500 text-sm"></p>

        <hr class="my-4">

        <p class="text-sm text-gray-500">CGPA</p>
        <p id="cgpa" class="text-xl font-bold text-blue-600"></p>
        
      </div>

      <!-- Activity -->
      <div class="bg-white rounded-xl shadow p-5 space-y-3">
        <h3 class="font-semibold text-gray-700">Your Activity</h3>

        <div class="flex justify-between text-sm">
          <span>Applications</span>
          <span id="applications"></span>
        </div>

        <div class="flex justify-between text-sm">
          <span>Status</span>
          <span id="status" class="text-green-600"></span>
        </div>
      </div>

      <!-- 📄 CV Upload -->
      <div class="bg-white rounded-xl shadow p-5">
        <h3 class="font-semibold mb-3">Upload CV</h3>

        <input type="file" id="cvUpload"
          class="w-full text-sm mb-3 border rounded p-2"/>

        <button id="uploadBtn"
          class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 text-sm">
          Upload
        </button>

        <p id="cvStatus" class="text-xs text-gray-500 mt-2"></p>
      </div>

    </div>

    <!-- 📰 CENTER -->
    <div class="col-span-6 space-y-6">

      <!-- Dynamic Announcement -->
      <div class="bg-white rounded-xl shadow p-5">
        <h3 class="font-semibold text-lg mb-2">Latest Opportunities</h3>
        <p id="announcement" class="text-sm text-gray-600"></p>
      </div>

      <!-- 🔥 Placement Cards (DYNAMIC) -->
      <div id="placementsContainer" class="space-y-5">
        <!-- JS will inject cards here -->
      </div>

    </div>

    <!-- 📊 RIGHT -->
    <div class="col-span-3 space-y-6">

      <!-- Profile Strength -->
      <div class="bg-white rounded-xl shadow p-5">
        <h3 class="font-semibold mb-3">Profile Strength</h3>

        <div class="w-full bg-gray-200 h-3 rounded-full">
          <div id="profileBar"
            class="bg-blue-600 h-3 rounded-full w-0"></div>
        </div>

        <p id="profileText" class="text-sm text-gray-500 mt-2"></p>
      </div>

      <!-- Tips -->
      <div class="bg-white rounded-xl shadow p-5">
        <h3 class="font-semibold mb-3">Tips</h3>
        <ul id="tipsList" class="text-sm text-gray-600 space-y-2">
          <!-- JS will inject tips -->
        </ul>
      </div>

    </div>

  </div>

  <!-- JS later -->
  <script src="student.js"></script>

</body>
</html>
