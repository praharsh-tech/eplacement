<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | E-Placement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 h-screen flex items-center justify-center">

  <!-- Card -->
  <div class="w-full max-w-md bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl shadow-2xl p-8">

    <!-- Title -->
    <h2 class="text-3xl font-bold text-white text-center mb-2">
      Welcome Back
    </h2>
    <p class="text-gray-400 text-center mb-6">
      Login to your account
    </p>

    <!-- Form -->
    <form id="loginForm" class="space-y-5">

      <!-- Role -->
      <div>
        <label class="text-gray-300 text-sm">Select Role</label>
        <select id="role"
          class="w-full mt-1 p-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Choose role</option>
          <option value="student">🎓 Student</option>
          <option value="admin">🛠 Admin</option>
        </select>
      </div>

      <!-- Username -->
      <div>
        <label class="text-gray-300 text-sm">Enrollment / Username</label>
        <input id="username" type="text" placeholder="Enter your ID"
          class="w-full mt-1 p-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <!-- Password -->
      <div>
        <label class="text-gray-300 text-sm">Password</label>
        <input id="password" type="password" placeholder="Enter password"
          class="w-full mt-1 p-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <!-- Button -->
      <button
        class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 transition-all duration-300 p-3 rounded-lg text-white font-semibold shadow-lg">
        Login
      </button>
      <p class="text-sm text-center mt-3">
  Don't have an account?
  <a href="signup.html" class="text-blue-600">Sign Up</a>
</p>

      <!-- Error -->
      <p id="error" class="text-red-400 text-sm text-center"></p>

    </form>

    <!-- Footer -->
    <p class="text-gray-500 text-xs text-center mt-6">
      © 2026 E-Placement Portal
    </p>

  </div>

  <script type="module" src="script.js"></script>

</body>
</html>
